name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PDM_CHECK_UPDATE: "0"

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: true

      - name: Install dependencies
        run: pdm install -G dev --frozen-lockfile

      - name: Lint
        run: |
          pdm run ruff check src tests
          pdm run ruff format --check src tests
          pdm run mypy src

      - name: Test
        run: pdm run pytest

      - name: Build package
        run: pdm build

      - name: Upload distributions
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: dist-py${{ matrix.python-version }}
          path: dist/*

  docker-image:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: python-framework:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke-test container
        run: |
          docker run --rm python-framework:ci hello
          docker run --rm python-framework:ci ping | grep -q pong
